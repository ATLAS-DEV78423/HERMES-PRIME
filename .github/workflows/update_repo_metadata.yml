name: Update Repo Metadata

on:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  update-metadata:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Update repository description and metadata
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const repo = context.repo;
            const description = "Hermes Prime — a deterministic governance engine for autonomous AI operations";
            const homepage = "https://github.com/ATLAS-DEV78423/HERMES-PRIME";
            const topics = ["governance","ai-safety","policy-engine","autonomous-agents"];
            try {
              await github.rest.repos.update({
                owner: repo.owner,
                repo: repo.repo,
                description: description,
                homepage: homepage,
              });
            } catch (error) {
              core.warning(`Could not update repository description: ${error.message}`);
            }
            try {
              await github.rest.repos.replaceAllTopics({
                owner: repo.owner,
                repo: repo.repo,
                names: topics,
              });
            } catch (error) {
              core.warning(`Could not update repository topics: ${error.message}`);
            }
