name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'false'
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        echo "=== Python & pip debug ==="
        python --version || true
        pip --version || true
        python -m pip --version || true
        echo "=== Installing dev deps (verbose) ==="
        pip install --upgrade pip -v
        python -m pip install -e ".[dev]" -v || python -m pip install -e "." -v
        python -m pip install pytest ruff mypy bandit pip-audit -v || true
    - name: Lint with ruff
      run: |
        ruff check .
        ruff check . --select I
    - name: Type check with mypy
      run: mypy hermes_prime/ infrastructure/
    - name: Security audit with pip-audit
      run: pip-audit

  test:
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'false'
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        python -m pip install -e ".[dev]" || python -m pip install -e "."
        python -m pip install pytest -v
    - name: Run tests
      run: pytest tests/ -v

  docker-build:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
    - uses: actions/checkout@v6
    - name: Build Docker image
      run: docker build -t hermes-prime:ci .
    - name: Verify image
      run: docker run --rm hermes-prime:ci --help

  security-scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install bandit
      run: |
        pip install --upgrade pip
        pip install bandit
    - name: Run bandit
      run: bandit -r hermes_prime -lll
